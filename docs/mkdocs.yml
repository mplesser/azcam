site_name: AzCam
site_author: Michael Lesser
site_url: 'https://azcam.readthedocs.io/en/latest/'
docs_dir: docs

# Repository
repo_name: mplesser
repo_url: https://github.com/mplesser/azcam
edit_uri: ""

theme:
  name: mkdocs
  palette:
    scheme: indigo
    primary: indigo
    accent: indigo
  logo:
    img/logo.gif
  favicon:
    img/favicon.ico
  icon:
    repo: fontawesome/brands/git-alt
  features:
    navigation.sections

plugins:
- search
- autorefs
- mkdocstrings:
    enabled: !ENV [ENABLE_MKDOCSTRINGS, true]
    custom_templates: templates
    default_handler: python
    handlers:
      python:
        options:
          show_source: true

#watch:
#  - /azcam/azcam/azcam
#  - /azcam/azcam-server/azcam_server
#  - /azcam/azcam-console/azcam_console
#  - /azcam/azcam-testers/azcam_testers

nav:
  - Home: 'index.md'
  - 'tools.md'
  - 'classes.md'
  - 'advanced.md'
  - 'autogenerated_docs.md'