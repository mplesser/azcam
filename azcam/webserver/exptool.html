<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AzCam Exptool</title>

    <!-- Bootstrap -->
    <!--
        <link href="static/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    -->
    <link href="static/bootstrap_so.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/style_exptool.css">
    <link rel="shortcut icon" href="static/favicon.ico">
</head>

<body>

    <div class="container-fluid">

        <!-- Tab menu -->
        <ul class="nav nav-pills">
            <li class="nav-item">
                <a class="nav-link active" data-toggle="pill" href="#exposure-tab">Exposure</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-toggle="pill" href="#filename-tab">Filename</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-toggle="pill" href="#detector-tab">Detector</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-toggle="pill" href="#options-tab">Options</a>
            </li>
        </ul>

        <!-- Tab content -->
        <div class="tab-content">

            <!-- Exposure tab -->
            <div id="exposure-tab" class="container-fluid tab-pane active">

                <div class="row">
                    <!-- control row -->

                    <div class="col-12">
                        <div class="card border-primary">
                            <div class="card-header">Control</div>
                            <div class="card-body">

                                <div class="row">

                                    <div class="col-2">
                                        <div class="btn-group-vertical btn-group-sm">
                                            <button type="button" class="btn btn-outline-primary mt-0" id="expose">Expose</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="sequence">Sequence</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="reset">Reset</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="pause">Pause</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="resume">Resume</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="readout">Readout</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="abort">Abort</button>
                                            <button type="button" class="btn btn-outline-primary mt-1" id="save_pars">Save
                                                Pars</button>
                                        </div>
                                    </div>

                                    <div class="col-10">

                                        <div class="row">
                                            <div class="col-5">
                                                <form class="form">
                                                    <div class="form-group" style="padding-left: 10px; width: 50%;">
                                                        <label for="imagetype">Image Type:</label>
                                                        <select id="imagetype" class="form-control-sm drop_box">
                                                        </select>
                                                    </div>
                                                </form>
                                            </div>

                                            <div class="col-4">
                                                <label for="exposuretime">Exposure time (s):</label>
                                                <input type="number" id="exposuretime" class="number_box" style="width: 50%;" value=1.0 title=" exposure time in seconds" min="0">
                                            </div>

                                            <div class="col-3">
                                                <div class="form-check">
                                                    <input type="checkbox" class="form-check-input" id="imagetest" title="check to create a tets image">
                                                    <label class="form-check-label" for="imagetest">Test image</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-4">
                                                <label for="seq_total">Num. Sequence Images:</label>
                                                <input type="number" id="seq_total" class="number_box" style="padding-left: 10px; width: 50%;" value=1 title="number of exposures in sequence" min="1">
                                            </div>

                                            <div class="col-4">
                                                <label for=seq_delay>Sequence Delay:</label>
                                                <input type="number" id="seq_delay" class="number_box" style="padding-left: 10px; width: 50%;" value=1 title="sequence delay (sec)" min="0">
                                            </div>

                                            <div class="col-4">
                                                <form class="form">
                                                    <div class="form-group">
                                                        <label for="seq_flush">Sequence Flushing:</label>
                                                        <select id="seq_flush" class="form-control-sm drop_box" style="width: 50%;" title="sequence flushing">
                                                            <option>All</option>
                                                            <option>Once</option>
                                                            <option>None</option>
                                                        </select>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-12">
                                                <label for="imagetitle">Image Title:</label>
                                                <input type="text" id="imagetitle" class="border border-primary" style="padding-left: 10px;" title="image title">
                                            </div>
                                        </div>

                                    </div>
                                    <!-- end column -->
                                </div>
                                <!-- end row -->
                            </div>
                            <!-- end card body -->
                        </div>
                        <!-- end card -->
                    </div>
                    <!-- end column -->
                </div>
                <!-- end row 1 -->

                <div class="row">
                    <!-- status row -->

                    <div class="col-12">

                        <div class="card border-primary">
                            <div class="card-header" id="statustitle">Status</div>
                            <div class="card-body">

                                <div class="row">
                                    <div class="col-12">
                                        <label for="imagefilename_status">Image filename:</label>
                                        <span class="border border-primary w-75" id="imagefilename_status" title="image filename"></span>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-3">
                                        <label for="camtemp">CamTemp:</label>
                                        <div class="border border-primary" style="width:50%;" id="camtemp" class="number_box">
                                            -999.99
                                        </div>
                                    </div>

                                    <div class="col-3">
                                        <label for="dewtemp">DewTemp:</label>
                                        <div class="border border-primary" style="width:50%;" id="dewtemp" class="number_box">
                                            -999.99
                                        </div>
                                    </div>

                                    <div class="col-3">
                                        <label for="colbin_status">ColBin:</label>
                                        <div class="border border-primary" style="width:50%;" id="colbin_status" class="number_box">1
                                        </div>
                                    </div>

                                    <div class="col-3">
                                        <label for="rowbin_status">RowBin:</label>
                                        <div class="border border-primary" style="width:50%;" id="rowbin_status" class="number_box">1
                                        </div>
                                    </div>

                                </div>

                                <div class="row">
                                    <div class="col-3">
                                        <div class="border" id="timestamp">timestamp</div>
                                    </div>
                                    <div class="col-9">
                                        <span class="border" id="message" title="messages">messages...</span>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-12">
                                        <div class="progress">
                                            <div class="progress-bar" id="progressbar" title="integration or readout progress" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">50</div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                        <!-- end card -->
                    </div>
                </div>
                <!-- end row 2 -->

            </div>
            <!-- end exposure tab -->

            <!-- Filename tab -->
            <div id="filename-tab" class="container-fluid tab-pane fade">

                <div class="card border-primary mb-3">
                    <div class="card-header">Filename</div>
                    <div class="card-body">

                        <div class="row">
                            <div class="col-12">
                                <label for="imagefolder">Directory name:</label>
                                <input type="text" id="imagefolder" title="image directory name">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <label for=imagesequencenumber>Image Number:</label>
                                <input type="number" id="imagesequencenumber" value=1 title="image sequence number" min="0">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <label for="imageroot">Rootname:</label>
                                <input type="text" id="imageroot" title="image root name">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="imageautoincrementsequencenumber" title="">
                                    <label class="form-check-label" for="imageautoincrementsequencenumber" title="increment sequence number after next exposure">Auto increment
                                        sequence
                                        number</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="imageoverwrite" title="">
                                    <label class="form-check-label" for="imageoverwrite" title="allow new image to overwrite existing image">Overwrite existing
                                        image</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="imageincludesequencenumber" title="">
                                    <label class="form-check-label" for="imageincludesequencenumber" title="include a sequence number">Include sequence
                                        number</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="imageautoname" title="use ImageType in filename">
                                    <label class="form-check-label" for="imageautoname">Auto Name</label>
                                </div>
                                <label for="rootname">Remote image mode:</label>
                                <input type="text" id="remotemode" style="background-color: white; border-width: 1px; width: 3%;margin-left: 10px;" title="Green when images will be sent from server to a remote machine">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- end filename tab -->

            <!-- Detector tab -->
            <div id="detector-tab" class="container-fluid tab-pane fade">
                <div class="card border-primary mb-3">
                    <div class="card-header">Detector</div>
                    <div class="card-body">

                        <div class="row">
                            <div class="col-2">
                                <label for=firstcol>FirstCol:</label>
                                <input type="number" id="firstcol" value=1 title="first unbinned column number" min="1">
                            </div>
                            <div class="col-2">
                                <label for=lastcol>LastCol:</label>
                                <input type="number" id="lastcol" value=9999 title="last unbinned column number" min="1">
                            </div>
                            <div class="col-2">
                                <label for=colbin>ColBin:</label>
                                <input type="number" id="colbin" value=1 title="column binning" min="1">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-2">
                                <label for=firstcol>FirstRow:</label>
                                <input type="number" id="firstrow" value=1 title="first unbinned row number" min="1">
                            </div>
                            <div class="col-2">
                                <label for=lastrow>LastRow:</label>
                                <input type="number" id="lastrow" value=9999 title="last unbinned row number" min="1">
                            </div>
                            <div class="col-2">
                                <label for=rowbin>RowBin:</label>
                                <input type="number" id="rowbin" value=1 title="row binning" min="1">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-4">
                                <div class="btn-group btn-group-sm">
                                    <button type="button" id="fullframe" class="btn btn-primary mr-2 mt-2" title="set ROI to full frame">Full Frame</button>
                                    <button type="button" id="applyroi" class="btn btn-primary mt-2" title="apply detector parameters">Apply</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            <!-- end detector tab -->

            <!-- Options tab -->
            <div id="options-tab" class="container-fluid tab-pane fade"><br>
                <div class="card border-primary mb-3">
                    <div class="card-header">Options</div>
                    <div class="card-body">

                        <input type="checkbox" id="flusharray" value="flusharray" title="flush sensor before each exposure">
                        <label for="flusharray"> Clear Array before each exposure</label><br>

                        <input type="checkbox" id="displayimage" value="displayimage" title="display image locally after each exposure">
                        <label for="displayimage"> Display image</label><br>

                        <input type="checkbox" id="instrumentenabled" value="instrumentenabled" title="enable instrument">
                        <label for="instrumentenabled"> Enable Instrument</label><br>

                        <input type="checkbox" id="telescopeenabled" value="telescopename" title="enable telescope">
                        <label for="telescopeenabled"> Enable Telescope</label><br>

                        <input type="checkbox" id="autotitle" value="autotitle" title="automatically title images by ImageType">
                        <label for="autotitle"> Auto title images</label><br>

                    </div>
                </div>
            </div>
            <!-- end options tab -->

        </div>
        <!-- end tab-content-->

    </div>
    <!-- end container -->

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="static/jquery-3.4.1.min.js"></script>
    <script src="static/popper.min.js"></script>
    <script src="static/bootstrap/js/bootstrap.min.js"></script>
    <script src="static/exptool.js"></script>
</body>

</html>
