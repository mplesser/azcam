<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>AzCam Home</title>

   <!-- Bootstrap -->
   <link href="static/bootstrap/css/bootstrap-4.0.0.css" rel="stylesheet">
   <link rel="stylesheet" type="text/css" href="static/style.css">
   <link rel="shortcut icon" href="static/favicon.ico">
</head>

<body>

   <div class="container-fluid">
      <div class="row">

         <div class="col-3">
            <div class="card border-primary mb-3">
               <div class="card-header">Actions</div>
               <div class="card-body">
                  <div class="btn-group-vertical btn-group-sm" role="group">
                     <button type="button" class="btn btn-outline-primary mt-0">Expose</button>
                     <button type="button" class="btn btn-outline-primary mt-1">Sequence</button>
                     <button type="button" class="btn btn-outline-primary mt-1">Reset</button>
                     <button type="button" class="btn btn-outline-primary mt-1">Pause</button>
                     <button type="button" class="btn btn-outline-primary mt-1 disabled">Resume</button>
                     <button type="button" class="btn btn-outline-primary mt-1 disabled">Readout</button>
                     <button type="button" class="btn btn-outline-primary mt-1 ">Abort</button>
                  </div>
               </div>
            </div> <!-- end card -->
         </div>

         <div class="col-9">
            <div class="card border-primary mb-3">
               <div class="card-header">Control</div>
               <div class="card-body">

                  <form class="form-inline">
                     <div class="form-group">
                        <label for="formImageType">Image Type:</label>
                        <select id="formImageType" class="form-control">
                           <option>zero</option>
                           <option>object</option>
                           <option>flat</option>
                           <option>dark</option>
                        </select>
                     </div>
                  </form>

                  <label for="numseq">NumSeq:</label>
                  <input type="number" id="numseq" value=1 name="numseq" title="number of exposures in sequence"
                     min="1">

                  <div class="form-check">
                     <input type="checkbox" class="form-check-input" id="testimage">
                     <label class="form-check-label" for="testimage">Test image</label>
                  </div>

                  <br>
                  <label for="exposuretime">Exposure time (s):</label>
                  <input type="number" id="exposuretime" value=1.0 name="exposuretime" title="exposure time in seconds"
                     min="0">

                  <br>
                  <label for="imagetitle">Image Title:</label>
                  <input type="text" id="imagetitle" name="imagetitle" title="image title">

               </div>
            </div> <!-- end card -->
         </div>
      </div> <!-- end row -->

      <div class="row">

         <div class="col">

            <div class="card border-primary mb-3">
               <div class="card-header">Status</div>
               <div class="card-body">

                  <div class="row">
                     <div id="timestamp">timestamp</div>
                  </div>

                  <div class="row">
                     <div class="col-12">
                        <label for="imagefilename">Image filename:</label>
                        <input type="text" readonly style="width: 100%;" id="imagefilename" name="imagefilename"
                           title="image filename">
                     </div>
                  </div>

                  <div class="row">
                     <div class="col-12">
                        <label for="camtemp">CamTemp:</label>
                        <div id="camtemp" class="alert alert-dark" style="width: 50%;" role="alert">-999.99
                        </div>
                     </div>

                     <div class="col">
                        <label for="dewtemp">DewTemp:</label>
                        <div id="dewtemp" class="alert alert-dark" style="width: 50%;" role="alert">-999.99
                        </div>
                     </div>
                  </div>

                  <div class="row">
                     <div class="col">
                        <label for="seqcount">Seq. Count:</label>
                        <input type="text" readonly id="seqcount" name="seqcount" title="current sequence counter">
                     </div>

                     <div class="col">
                        <label for="expstatus">Exp. Status:</label>
                        <input type="text" readonly id="expstatus" name="expstatus" title="current exposure status"
                           style="background-color: red">
                     </div>

                     <div class="col">
                        <label for="errorstatus">Error:</label>
                        <input type="text" readonly id="errorstatus" name="errorstatus" title="current error status"
                           style="background-color: green">
                     </div>
                  </div>

                  <div class="row">
                     <div class="col">
                        <label id="message" name="message" title="messages">messages...
                     </div>
                  </div>

                  <div class="row">
                     <div class="col">
                        <div class="progress">
                           <div class="progress-bar" id="progressbar" role="progressbar" aria-valuenow="50"
                              aria-valuemin="0" aria-valuemax="100">50</div>
                        </div>
                     </div>
                  </div>

               </div>
            </div> <!-- end card -->
         </div>
      </div> <!-- end row -->

   </div> <!-- end container -->

   <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
   <script src="static/bootstrap/js/jquery-3.2.1.min.js"></script>
   <script src="static/bootstrap/js/popper.min.js"></script>
   <script src="static/bootstrap/js/bootstrap-4.0.0.js"></script>
   <script src="static/exptool.js"></script>
</body>

</html>
