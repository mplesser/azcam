<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>AzCam Home</title>

   <!-- Bootstrap -->
   <link href="static/bootstrap/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" type="text/css" href="static/style_exptool.css">
   <link rel="shortcut icon" href="static/favicon.ico">
</head>

<body>

   <div class="container">

      <!-- Tab menu -->
      <ul class="nav nav-pills" role="tablist">
         <li class="nav-item">
            <a class="nav-link active" data-toggle="pill" href="#exposure-tab">Exposure</a>
         </li>
         <li class="nav-item">
            <a class="nav-link" data-toggle="pill" href="#filename-tab">Filename</a>
         </li>
         <li class="nav-item">
            <a class="nav-link" data-toggle="pill" href="#detector-tab">Detector</a>
         </li>
         <li class="nav-item">
            <a class="nav-link" data-toggle="pill" href="#options-tab">Options</a>
         </li>
      </ul>

      <!-- Tab panes -->
      <div class="tab-content">

         <!-- Exposure tab -->
         <div id="exposure-tab" class="container tab-pane active">
            <h3>Exposure</h3>

            <div class="row">

               <div class="col-3">
                  <div class="card border-primary mb-3">
                     <div class="card-header">Actions</div>
                     <div class="card-body">
                        <div class="btn-group-vertical btn-group-sm" role="group">
                           <button type="button" class="btn btn-outline-primary mt-0">Expose</button>
                           <button type="button" class="btn btn-outline-primary mt-1">Sequence</button>
                           <button type="button" class="btn btn-outline-primary mt-1">Reset</button>
                           <button type="button" class="btn btn-outline-primary mt-1">Pause</button>
                           <button type="button" class="btn btn-outline-primary mt-1 disabled">Resume</button>
                           <button type="button" class="btn btn-outline-primary mt-1 disabled">Readout</button>
                           <button type="button" class="btn btn-outline-primary mt-1 ">Abort</button>
                        </div>
                     </div>
                  </div> <!-- end card -->
               </div>

               <div class="col-9">
                  <div class="card border-primary mb-3">
                     <div class="card-header">Control</div>
                     <div class="card-body">

                        <form class="form-inline">
                           <div class="form-group">
                              <label for="formImageType">Image Type:</label>
                              <select id="formImageType" class="form-control">
                                 <option>zero</option>
                                 <option>object</option>
                                 <option>flat</option>
                                 <option>dark</option>
                              </select>
                           </div>
                        </form>

                        <label for="numseq">NumSeq:</label>
                        <input type="number" id="numseq" value=1 name="numseq" title="number of exposures in sequence"
                           min="1">

                        <div class="form-check">
                           <input type="checkbox" class="form-check-input" id="testimage">
                           <label class="form-check-label" for="testimage">Test image</label>
                        </div>

                        <br>
                        <label for="exposuretime">Exposure time (s):</label>
                        <input type="number" id="exposuretime" value=1.0 name="exposuretime"
                           title="exposure time in seconds" min="0">

                        <br>
                        <label for="imagetitle">Image Title:</label>
                        <input type="text" id="imagetitle" name="imagetitle" title="image title">

                     </div>
                  </div> <!-- end card -->
               </div>
            </div> <!-- end row 1 -->

            <div class="row">

               <div class="col">

                  <div class="card border-primary mb-3">
                     <div class="card-header">Status</div>
                     <div class="card-body">

                        <div class="row">
                           <div id="timestamp">timestamp</div>
                        </div>

                        <div class="row">
                           <div class="col-12">
                              <label for="imagefilename">Image filename:</label>
                              <input type="text" readonly style="width: 100%;" id="imagefilename" name="imagefilename"
                                 title="image filename">
                           </div>
                        </div>

                        <div class="row">
                           <div class="col-12">
                              <label for="camtemp">CamTemp:</label>
                              <div id="camtemp" class="alert alert-dark" style="width: 50%;" role="alert">-999.99
                              </div>
                           </div>

                           <div class="col">
                              <label for="dewtemp">DewTemp:</label>
                              <div id="dewtemp" class="alert alert-dark" style="width: 50%;" role="alert">-999.99
                              </div>
                           </div>
                        </div>

                        <div class="row">
                           <div class="col">
                              <label for="seqcount">Seq. Count:</label>
                              <input type="text" readonly id="seqcount" name="seqcount"
                                 title="current sequence counter">
                           </div>

                           <div class="col">
                              <label for="expstatus">Exp. Status:</label>
                              <input type="text" readonly id="expstatus" name="expstatus"
                                 title="current exposure status" style="background-color: red">
                           </div>

                           <div class="col">
                              <label for="errorstatus">Error:</label>
                              <input type="text" readonly id="errorstatus" name="errorstatus"
                                 title="current error status" style="background-color: green">
                           </div>
                        </div>

                        <div class="row">
                           <div class="col">
                              <label id="message" name="message" title="messages">messages...
                           </div>
                        </div>

                        <div class="row">
                           <div class="col">
                              <div class="progress">
                                 <div class="progress-bar" id="progressbar" role="progressbar"
                                    title="integration or readout progress" aria-valuenow="50" aria-valuemin="0"
                                    aria-valuemax="100">50</div>
                              </div>
                           </div>
                        </div>

                     </div>
                  </div> <!-- end card -->
               </div>
            </div> <!-- end row 2 -->

         </div> <!-- end exposure tab -->

         <!-- Filename tab -->
         <div id="filename-tab" class="container tab-pane fade">

            <div class="card border-primary mb-3">
               <div class="card-header">Filename</div>
               <div class="card-body">

                  <div class="row">
                     <div class="col-md-12">
                        <label for="rootname">Directory name:</label>
                        <input type="text" id="dirname" name="dirname" title="image directory name">
                     </div>
                  </div>

                  <div class="row">
                     <div class="col-md-12">
                        <label for=imageseqnum>Sequence Number:</label>
                        <input type="number" id="imageseqnum" value=1 name="imageseqnum" title="image sequence number"
                           min="0">
                     </div>

                     <div class="col-md-12">
                        <label for="rootname">Rootname:</label>
                        <input type="text" id="rootname" name="rootname" title="image root name">
                     </div>
                  </div>

                  <div class="row">

                     <div class="col-md-8">
                        <div class="form-check">
                           <input class="form-check-input" type="checkbox" value="" id="autoincseqnum" title="">
                           <label class="form-check-label" for="defaultCheck1">Auto increment sequence number</label>
                        </div>
                        <div class="form-check">
                           <input class="form-check-input" type="checkbox" value="" id="overwrite" title="">
                           <label class="form-check-label" for="defaultCheck1">Overwrite existing image</label>
                        </div>
                        <div class="form-check">
                           <input class="form-check-input" type="checkbox" value="" id="includeseqnum" title="">
                           <label class="form-check-label" for="defaultCheck1">Include sequence number</label>
                        </div>
                        <div class="form-check">
                           <input class="form-check-input" type="checkbox" value="" id="autoname" title="">
                           <label class="form-check-label" for="defaultCheck1">Auto Name</label>
                        </div>
                        <div class="form-check">
                           <input class="form-check-input" type="checkbox" value="" id="testimage" title="">
                           <label class="form-check-label" for="defaultCheck1">Test Image</label>
                        </div>
                     </div>
                     <div class="col-md-4">
                        <label for="rootname">Remote image mode:</label>
                        <input type="text" id="remotemode" name="remotemode" style="background-color: green"
                           title="ON when images will be sent to remote machine">
                     </div>
                  </div>
               </div>
            </div>
         </div> <!-- end filename tab -->

         <!-- Detector tab -->
         <div id="detector-tab" class="container tab-pane fade">
            <div class="card border-primary mb-3">
               <div class="card-header">Detector</div>
               <div class="card-body">

                  <div class="row">
                     <div class="col-md-1">
                        <label for=firstcol>FirstCol:</label>
                        <input type="number" id="firstcol" value=1 name="firstcol" title="first unbinned column number"
                           min="1">
                     </div>
                     <div class="col-md-1">
                        <label for=lastcol>LastCol:</label>
                        <input type="number" id="lastcol" value=9999 name="lastcol" title="last unbinned column number"
                           min="1">
                     </div>
                     <div class="col-md-1">
                        <label for=colbin>ColBin:</label>
                        <input type="number" id="colbin" value=1 name="colbin" title="column binning" min="1">
                     </div>
                  </div>
                  <div class="row">
                     <div class="col-md-1">
                        <label for=firstcol>FirstRow:</label>
                        <input type="number" id="firstrow" value=1 name="firstrow" title="first unbinned row number"
                           min="1">
                     </div>
                     <div class="col-md-1">
                        <label for=lastrow>LastRow:</label>
                        <input type="number" id="lastrow" value=9999 name="lastrow" title="last unbinned row number"
                           min="1">
                     </div>
                     <div class="col-md-1">
                        <label for=rowbin>RowBin:</label>
                        <input type="number" id="rowbin" value=1 name="rowbin" title="row binning" min="1">
                     </div>
                  </div>
                  <div class="row">
                     <div class="col-md-4">
                        <div class="btn-group btn-group-sm" role="group">
                           <button type="button" id="fullframe" class="btn btn-primary mr-2 mt-2" 
                           title="set ROI to ful frame">Full Frame</button>
                           <button type="button" id="applyroi" class="btn btn-primary mt-2" 
                           title="apply detector parameters">Apply</button>
                        </div>
                     </div>
                  </div>

               </div>
            </div>
         </div> <!-- end detector tab -->

         <!-- Options tab -->
         <div id="options-tab" class="container tab-pane fade"><br>
            <div class="card border-primary mb-3">
               <div class="card-header">Options</div>
               <div class="card-body">




               </div>
            </div>
         </div> <!-- end options tab -->

      </div> <!-- end tab-content-->

   </div> <!-- end container -->

   <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
   <script src="static/jquery-3.4.1.min.js"></script>
   <script src="static/popper.min.js"></script>
   <script src="static/bootstrap/js/bootstrap.min.js"></script>
   <script src="static/exptool.js"></script>
</body>

</html>
